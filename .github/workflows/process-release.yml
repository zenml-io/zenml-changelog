name: Process release

on:
  repository_dispatch:
    types: [release-published]
  workflow_dispatch:
    inputs:
      source_repo:
        description: "Source repository (e.g., zenml-io/zenml)"
        required: true
        type: choice
        options:
          - zenml-io/zenml
          - zenml-io/zenml-cloud-api
      release_tag:
        description: "Release tag (e.g., 0.75.0)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  SOURCE_REPO: ${{ inputs.source_repo || github.event.client_payload.repo }}
  RELEASE_TAG: ${{ inputs.release_tag || github.event.client_payload.release_tag }}
  RELEASE_URL: ${{ github.event.client_payload.release_url || '' }}
  PUBLISHED_AT: ${{ github.event.client_payload.published_at || '' }}

jobs:
  generate:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.workflow_outputs.outputs.has_changes }}
      markdown_file: ${{ steps.workflow_outputs.outputs.markdown_file }}
      breaking_changes: ${{ steps.workflow_outputs.outputs.breaking_changes }}
      needs_attention: ${{ steps.workflow_outputs.outputs.needs_attention }}
      source_windows: ${{ steps.workflow_outputs.outputs.source_windows }}
      shadow_widget_comment_exists: ${{ steps.shadow_comment_outputs.outputs.widget_comment_exists }}
      shadow_release_notes_comment_exists: ${{ steps.shadow_comment_outputs.outputs.release_notes_comment_exists }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Run changelog update script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
          CHANGELOG_LLM_PROVIDER: ${{ vars.CHANGELOG_LLM_PROVIDER || 'openai' }}
          CHANGELOG_LLM_MODEL: ${{ vars.CHANGELOG_LLM_MODEL || '' }}
          CHANGELOG_LLM_MODEL_GROUPED: ${{ vars.CHANGELOG_LLM_MODEL_GROUPED || 'gpt-5.4' }}
          CHANGELOG_LLM_MODEL_BREAKING: ${{ vars.CHANGELOG_LLM_MODEL_BREAKING || 'gpt-5.4' }}
          CHANGELOG_LLM_MODEL_RELEASE_NOTES: ${{ vars.CHANGELOG_LLM_MODEL_RELEASE_NOTES || 'gpt-5.5' }}
          CHANGELOG_OPENAI_SHADOW_MODE: "true"
          CHANGELOG_OPENAI_SHADOW_WIDGET_COMMENT: openai-shadow-widget-comment.md
          CHANGELOG_OPENAI_SHADOW_RELEASE_NOTES_COMMENT: openai-shadow-release-notes-comment.md
          SOURCE_REPO: ${{ env.SOURCE_REPO }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          RELEASE_URL: ${{ env.RELEASE_URL }}
          PUBLISHED_AT: ${{ env.PUBLISHED_AT }}
          CHANGELOG_WORKFLOW_RESULT: changelog_workflow_result.json
        run: |
          set -euo pipefail
          uv run scripts/update_changelog.py

      - name: Publish changelog workflow outputs
        id: workflow_outputs
        env:
          CHANGELOG_WORKFLOW_RESULT: changelog_workflow_result.json
        run: |
          set -euo pipefail
          uv run scripts/workflow_result.py write-github-outputs

      - name: Publish shadow comment outputs
        id: shadow_comment_outputs
        run: |
          set -euo pipefail
          if [ -s openai-shadow-widget-comment.md ]; then
            echo "widget_comment_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "widget_comment_exists=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -s openai-shadow-release-notes-comment.md ]; then
            echo "release_notes_comment_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "release_notes_comment_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate changelog.json
        if: steps.workflow_outputs.outputs.has_changes == 'true'
        uses: cardinalby/schema-validator-action@v3
        with:
          file: ./changelog.json
          schema: ./changelog_schema/announcement-schema.json

      - name: Create widget patch
        if: steps.workflow_outputs.outputs.has_changes == 'true'
        run: |
          set -euo pipefail
          git diff --binary -- changelog.json .image_state > widget.patch

      - name: Create release notes patch
        if: steps.workflow_outputs.outputs.has_changes == 'true'
        env:
          MARKDOWN_FILE: ${{ steps.workflow_outputs.outputs.markdown_file }}
        run: |
          set -euo pipefail
          git diff --binary -- "$MARKDOWN_FILE" .consumed_sources_state > release-notes.patch

      - name: Upload widget patch artifact
        if: steps.workflow_outputs.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: widget-patch
          path: widget.patch
          if-no-files-found: error

      - name: Upload release notes patch artifact
        if: steps.workflow_outputs.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-notes-patch
          path: release-notes.patch
          if-no-files-found: error

      - name: Upload OpenAI shadow widget comment artifact
        if: steps.shadow_comment_outputs.outputs.widget_comment_exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: openai-shadow-widget-comment
          path: openai-shadow-widget-comment.md
          if-no-files-found: error

      - name: Upload OpenAI shadow release notes comment artifact
        if: steps.shadow_comment_outputs.outputs.release_notes_comment_exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: openai-shadow-release-notes-comment
          path: openai-shadow-release-notes-comment.md
          if-no-files-found: error

  pr-widget:
    runs-on: ubuntu-latest
    needs: generate
    if: needs.generate.outputs.has_changes == 'true'
    steps:
      - name: Checkout repository (main)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Compute SOURCE_REPO_SLUG
        run: |
          set -euo pipefail
          echo "SOURCE_REPO_SLUG=${SOURCE_REPO//\//-}" >> "$GITHUB_ENV"

      - name: Download widget patch artifact
        uses: actions/download-artifact@v4
        with:
          name: widget-patch
          path: .

      - name: Apply widget patch
        run: |
          set -euo pipefail
          git apply widget.patch

      - name: Create Pull Request (widget)
        id: create_widget_pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Update changelog widget for ${{ env.SOURCE_REPO }}@${{ env.RELEASE_TAG }}"
          branch: changelog/${{ env.SOURCE_REPO_SLUG }}/${{ env.RELEASE_TAG }}
          base: main
          title: "Changelog widget: ${{ env.SOURCE_REPO }} ${{ env.RELEASE_TAG }}"
          body: |
            Automated changelog widget update triggered by release:
            - **Repository:** ${{ env.SOURCE_REPO }}
            - **Tag:** ${{ env.RELEASE_TAG }}

            This PR intentionally contains only dashboard widget state: `changelog.json` and `.image_state`. The release-notes PR for the same run owns the markdown file and `.consumed_sources_state` ledger.

            ### Source windows

            ```text
            ${{ needs.generate.outputs.source_windows }}
            ```

            ${{ needs.generate.outputs.needs_attention && '### ⚠️ PRs Needing Manual Review' || '' }}
            ${{ needs.generate.outputs.needs_attention }}

            **Please review:**
            - [ ] LLM-generated grouped summaries are accurate and reflect the most important changes
            - [ ] changelog.json entries have correct labels
            - [ ] Schema validation passes
            - [ ] Optional fields (`learn_more_url`, `docs_url`, `feature_image_url`) populated where applicable
          reviewers: htahir1,znegrin,strickvl
          labels: internal,x-squad
          add-paths: |
            changelog.json
            .image_state

      - name: Download OpenAI shadow widget comment artifact
        if: needs.generate.outputs.shadow_widget_comment_exists == 'true' && steps.create_widget_pr.outputs.pull-request-number != ''
        uses: actions/download-artifact@v4
        with:
          name: openai-shadow-widget-comment
          path: shadow-comments

      - name: Read OpenAI shadow widget comment
        if: needs.generate.outputs.shadow_widget_comment_exists == 'true' && steps.create_widget_pr.outputs.pull-request-number != ''
        id: read_widget_shadow_comment
        run: |
          set -euo pipefail
          delimiter="$(uuidgen)"
          {
            echo "body<<$delimiter"
            cat shadow-comments/openai-shadow-widget-comment.md
            echo "$delimiter"
          } >> "$GITHUB_OUTPUT"

      - name: Find OpenAI shadow widget comment
        if: needs.generate.outputs.shadow_widget_comment_exists == 'true' && steps.create_widget_pr.outputs.pull-request-number != ''
        id: find_widget_shadow_comment
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ steps.create_widget_pr.outputs.pull-request-number }}
          comment-author: github-actions[bot]
          body-includes: zenml-changelog-openai-shadow-widget

      - name: Create or update OpenAI shadow widget comment
        if: needs.generate.outputs.shadow_widget_comment_exists == 'true' && steps.create_widget_pr.outputs.pull-request-number != ''
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find_widget_shadow_comment.outputs.comment-id }}
          issue-number: ${{ steps.create_widget_pr.outputs.pull-request-number }}
          body: ${{ steps.read_widget_shadow_comment.outputs.body }}
          edit-mode: replace

  pr-release-notes:
    runs-on: ubuntu-latest
    needs: generate
    if: needs.generate.outputs.has_changes == 'true'
    steps:
      - name: Checkout repository (main)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Compute SOURCE_REPO_SLUG
        run: |
          set -euo pipefail
          echo "SOURCE_REPO_SLUG=${SOURCE_REPO//\//-}" >> "$GITHUB_ENV"

      - name: Download release notes patch artifact
        uses: actions/download-artifact@v4
        with:
          name: release-notes-patch
          path: .

      - name: Apply release notes patch
        run: |
          set -euo pipefail
          git apply release-notes.patch

      - name: Select reviewers and labels
        id: routing
        run: |
          set -euo pipefail
          case "$SOURCE_REPO" in
            "zenml-io/zenml")
              echo "reviewers=schustmi,bcdurak" >> "$GITHUB_OUTPUT"
              echo "labels=core-squad,internal" >> "$GITHUB_OUTPUT"
              ;;
            "zenml-io/zenml-cloud-api")
              echo "reviewers=schustmi,bcdurak" >> "$GITHUB_OUTPUT"
              echo "labels=core-squad,internal" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "reviewers=htahir1,strickvl,znegrin" >> "$GITHUB_OUTPUT"
              echo "labels=internal,x-squad" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Create Pull Request (release notes)
        id: create_release_notes_pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Update release notes for ${{ env.SOURCE_REPO }}@${{ env.RELEASE_TAG }}"
          branch: release-notes/${{ env.SOURCE_REPO_SLUG }}/${{ env.RELEASE_TAG }}
          base: main
          title: "Release notes: ${{ env.SOURCE_REPO }} ${{ env.RELEASE_TAG }}"
          body: |
            <!--
            ZENML_CHANGELOG_SYNC_META
            source_repo=${{ env.SOURCE_REPO }}
            release_tag=${{ env.RELEASE_TAG }}
            markdown_file=${{ needs.generate.outputs.markdown_file }}
            END_ZENML_CHANGELOG_SYNC_META
            -->

            Automated release notes update triggered by release:
            - **Repository:** ${{ env.SOURCE_REPO }}
            - **Tag:** ${{ env.RELEASE_TAG }}
            - **Markdown file:** `${{ needs.generate.outputs.markdown_file }}`

            This PR owns the release-note markdown and `.consumed_sources_state`. Keeping the consumed-source ledger in this PR prevents a source window from being marked consumed unless the markdown that represents it is merged.

            ### Source windows

            ```text
            ${{ needs.generate.outputs.source_windows }}
            ```

            ${{ needs.generate.outputs.breaking_changes && '### ⚠️ Breaking Changes' || '' }}
            ${{ needs.generate.outputs.breaking_changes }}

            **Please review:**
            - [ ] Markdown formatting looks good in GitBook
            - [ ] Breaking changes are accurately described and migration guidance is clear (if applicable)
            - [ ] Source windows make sense; skipped windows are finalized and will not be reopened for late-labeled PRs
          reviewers: ${{ steps.routing.outputs.reviewers }}
          labels: ${{ steps.routing.outputs.labels }}
          add-paths: |
            ${{ needs.generate.outputs.markdown_file }}
            .consumed_sources_state

      - name: Download OpenAI shadow release notes comment artifact
        if: needs.generate.outputs.shadow_release_notes_comment_exists == 'true' && steps.create_release_notes_pr.outputs.pull-request-number != ''
        uses: actions/download-artifact@v4
        with:
          name: openai-shadow-release-notes-comment
          path: shadow-comments

      - name: Read OpenAI shadow release notes comment
        if: needs.generate.outputs.shadow_release_notes_comment_exists == 'true' && steps.create_release_notes_pr.outputs.pull-request-number != ''
        id: read_release_notes_shadow_comment
        run: |
          set -euo pipefail
          delimiter="$(uuidgen)"
          {
            echo "body<<$delimiter"
            cat shadow-comments/openai-shadow-release-notes-comment.md
            echo "$delimiter"
          } >> "$GITHUB_OUTPUT"

      - name: Find OpenAI shadow release notes comment
        if: needs.generate.outputs.shadow_release_notes_comment_exists == 'true' && steps.create_release_notes_pr.outputs.pull-request-number != ''
        id: find_release_notes_shadow_comment
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ steps.create_release_notes_pr.outputs.pull-request-number }}
          comment-author: github-actions[bot]
          body-includes: zenml-changelog-openai-shadow-release-notes

      - name: Create or update OpenAI shadow release notes comment
        if: needs.generate.outputs.shadow_release_notes_comment_exists == 'true' && steps.create_release_notes_pr.outputs.pull-request-number != ''
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find_release_notes_shadow_comment.outputs.comment-id }}
          issue-number: ${{ steps.create_release_notes_pr.outputs.pull-request-number }}
          body: ${{ steps.read_release_notes_shadow_comment.outputs.body }}
          edit-mode: replace
